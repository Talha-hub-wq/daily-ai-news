name: Keep Alive Render App

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Render App with Retry
        run: |
          URL="https://daily-ai-news-merl.onrender.com/"

          for i in 1 2 3; do
            echo "Attempt $i..."

            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --connect-timeout 10 \
              --max-time 30 \
              $URL)

            if [ "$STATUS" = "200" ]; then
              echo "✅ Success"
              exit 0
            fi

            echo "❌ Failed (status: $STATUS), retrying..."
            sleep 15
          done

          echo "🚨 All retries failed"
          exit 1

