- name: Trigger Daily News Update with Retry
  run: |
    SERVICE_URL="https://daily-ai-news-merl.onrender.com"

    echo "⏳ Waiting for app to wake up..."
    sleep 30

    for i in 1 2 3; do
      echo "Attempt $i..."

      RESPONSE=$(curl -s -w '\n%{http_code}' -X POST "$SERVICE_URL/trigger-news" \
        --connect-timeout 15 \
        --max-time 90 \
        -H "Content-Type: application/json")

      HTTP_CODE=$(echo "$RESPONSE" | tail -n1)

      if [ "$HTTP_CODE" = "200" ]; then
        echo "✅ Success"
        exit 0
      fi

      echo "❌ Failed ($HTTP_CODE), retrying in 20s..."
      sleep 20
    done

    echo "🚨 All retries failed"
    exit 1

