<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily AI & World News</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }
        .header h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 600;
        }
        .header p {
            margin: 8px 0 0 0;
            font-size: 14px;
            opacity: 0.9;
        }
        .content {
            padding: 40px 30px;
        }
        .section {
            margin-bottom: 40px;
        }
        .section-title {
            font-size: 20px;
            font-weight: 600;
            color: #1a1a1a;
            margin: 0 0 20px 0;
            padding-bottom: 10px;
            border-bottom: 3px solid #667eea;
        }
        .article {
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid #e0e0e0;
        }
        .article:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        .article-title {
            margin: 0 0 10px 0;
            color: #1a73e8;
            font-size: 16px;
            font-weight: 600;
            line-height: 1.4;
        }
        .article-summary {
            margin: 8px 0;
            color: #555555;
            font-size: 14px;
            line-height: 1.6;
        }
        .article-meta {
            margin: 8px 0;
            font-size: 12px;
            color: #777777;
        }
        .article-link {
            margin: 0;
            font-size: 12px;
        }
        .article-link a {
            color: #1a73e8;
            text-decoration: none;
            font-weight: 500;
        }
        .article-link a:hover {
            text-decoration: underline;
        }
        .footer {
            background-color: #f9f9f9;
            padding: 20px 30px;
            text-align: center;
            border-top: 1px solid #e0e0e0;
            font-size: 12px;
            color: #999999;
        }
        .divider {
            height: 1px;
            background-color: #e0e0e0;
            margin: 30px 0;
        }
        @media (max-width: 600px) {
            body {
                padding: 10px;
            }
            .container {
                border-radius: 0;
            }
            .header {
                padding: 30px 20px;
            }
            .header h1 {
                font-size: 22px;
            }
            .content {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>📰 Daily AI & World News</h1>
            <p>Your daily digest of the latest AI innovations and global updates</p>
        </div>

        <!-- Content -->
        <div class="content">
            <!-- AI News Section -->
            <div class="section">
                <h2 class="section-title">🤖 Top AI News</h2>
                {{ AI_NEWS }}
            </div>

            <div class="divider"></div>

            <!-- World News Section -->
            <div class="section">
                <h2 class="section-title">🌍 Top World News</h2>
                {{ WORLD_NEWS }}
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <p>You're receiving this email because you subscribed to Daily AI & World News updates.</p>
            <p>This email is sent automatically at 10:00 PM daily.</p>
        </div>
    </div>
</body>
</html>
